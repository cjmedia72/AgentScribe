<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentScribe — Sessions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #e8e8e8;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 .logo {
      width: 28px; height: 28px;
      background: #ef4444; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
    }

    .subtitle { color: #888; font-size: 13px; }

    .header-right {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      background: #2d2d2d;
      border: 1px solid #444;
      color: #ccc;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background: #383838;
      border-color: #666;
      color: #fff;
    }

    .btn-danger {
      border-color: #5a2020;
      color: #ef4444;
    }

    .btn-danger:hover {
      background: #2a1515;
      color: #fca5a5;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-bar input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8e8e8;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-bar input:focus { border-color: #3b82f6; }

    .search-count {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }

    .session-card.hidden { display: none; }

    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 16px 20px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .stats-bar .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stats-bar .stat .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-bar .stat .value {
      font-size: 18px;
      font-weight: 700;
      color: #e8e8e8;
      font-variant-numeric: tabular-nums;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .session-card {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      padding: 18px 20px;
      transition: border-color 0.15s;
    }

    .session-card:hover {
      border-color: #444;
    }

    .session-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .session-info {
      flex: 1;
      min-width: 0;
    }

    .session-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-meta {
      font-size: 12px;
      color: #888;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .session-meta .meta-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .session-meta .meta-item strong {
      color: #ccc;
      font-weight: 600;
    }

    .session-url {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      font-family: 'SF Mono', 'Consolas', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-note-input {
      margin-top: 8px;
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      border-radius: 6px;
      padding: 6px 10px;
      color: #ccc;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .session-note-input:focus {
      border-color: #3b82f6;
      background: #161616;
    }

    .session-note-input::placeholder { color: #555; }

    .session-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .export-group {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      border-radius: 8px;
    }

    .export-btn {
      padding: 6px 10px;
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 11px;
      font-weight: 600;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .export-btn:hover {
      background: #2d2d2d;
      color: #fff;
    }

    .export-btn.mcp-hidden { display: none; }

    .bundle-btn {
      padding: 7px 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .bundle-btn:hover { opacity: 0.92; }
    .bundle-btn:active { transform: scale(0.97); }
    .bundle-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .clipboard-btn {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .clipboard-btn:hover {
      background: #2d2d2d;
      border-color: #666;
      color: #fff;
    }

    .clipboard-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .preview-btn {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid #2d2d2d;
      color: #888;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .preview-btn:hover {
      background: #1e2a3a;
      border-color: #3b82f6;
      color: #93c5fd;
    }

    /* --- Preview modal --- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }

    .modal-backdrop.visible { display: flex; }

    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      max-width: 800px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid #2d2d2d;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .modal-subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .modal-close {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }

    .modal-close:hover {
      background: #2d2d2d;
      color: #fff;
    }

    .modal-body {
      padding: 8px 0;
      overflow-y: auto;
      flex: 1;
    }

    .timeline-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 20px;
      border-bottom: 1px solid #222;
      font-size: 12px;
    }

    .timeline-row:hover { background: #161616; }

    .timeline-time {
      color: #666;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      min-width: 56px;
      padding-top: 1px;
    }

    .timeline-icon {
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .timeline-content {
      flex: 1;
      min-width: 0;
    }

    .timeline-type {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 6px;
    }

    .timeline-type.click { background: #1e3a5f; color: #93c5fd; }
    .timeline-type.input,
    .timeline-type.paste { background: #3a2a1e; color: #fcd34d; }
    .timeline-type.navigation { background: #1e3a2e; color: #86efac; }
    .timeline-type.scroll,
    .timeline-type.focus,
    .timeline-type.blur,
    .timeline-type.keydown { background: #2a2a2a; color: #aaa; }
    .timeline-type.network { background: #3a1e3a; color: #d8b4fe; }

    .timeline-desc {
      color: #ccc;
      word-break: break-word;
    }

    .timeline-detail {
      color: #777;
      font-size: 11px;
      font-family: 'SF Mono', 'Consolas', monospace;
      margin-top: 2px;
      word-break: break-all;
    }

    .timeline-empty {
      padding: 40px 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }

    .delete-btn {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid #2d2d2d;
      color: #888;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .delete-btn:hover {
      background: #2a1515;
      border-color: #5a2020;
      color: #ef4444;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state .title {
      font-size: 16px;
      color: #888;
      margin-bottom: 6px;
    }

    .empty-state .hint {
      font-size: 13px;
      color: #555;
    }

    .session-card .toast {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      background: #1a2419;
      border: 1px solid #2a4a20;
      border-radius: 6px;
      font-size: 12px;
      color: #86efac;
    }

    .session-card .toast.visible { display: block; }

    @media (max-width: 720px) {
      .session-row { flex-direction: column; align-items: stretch; }
      .session-actions { justify-content: space-between; }
    }

    /* --- Storage Debug Panel --- */
    .debug-panel {
      background: #15110d;
      border: 1px solid #3a2a1e;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
    }

    .debug-panel .debug-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      color: #fcd34d;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .debug-panel .debug-header:hover { background: #1a140f; }
    .debug-panel.expanded .debug-header { border-bottom: 1px solid #3a2a1e; }

    .debug-panel .debug-caret {
      font-size: 10px;
      color: #888;
      transition: transform 0.15s;
    }

    .debug-panel.expanded .debug-caret { transform: rotate(90deg); }

    .debug-panel .debug-body {
      display: none;
      padding: 10px 14px 14px;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      color: #ccc;
    }

    .debug-panel.expanded .debug-body { display: block; }

    .debug-section { margin-top: 8px; }
    .debug-section:first-child { margin-top: 0; }

    .debug-section h4 {
      font-size: 10px;
      color: #fcd34d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 700;
    }

    .debug-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px dotted #2a2018;
    }

    .debug-row:last-child { border-bottom: none; }
    .debug-row .k { color: #aaa; }
    .debug-row .v { color: #fcd34d; font-variant-numeric: tabular-nums; }
    .debug-row .v.zero { color: #555; }
    .debug-row .v.large { color: #f87171; font-weight: 700; }

    .debug-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .debug-btn {
      padding: 6px 12px;
      background: #2a1f14;
      border: 1px solid #4a3520;
      color: #fcd34d;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-weight: 600;
    }

    .debug-btn:hover { background: #3a2a1c; border-color: #6a4a30; }
    .debug-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .debug-btn.danger {
      background: #2a1414;
      border-color: #5a2020;
      color: #ef4444;
    }

    .debug-btn.danger:hover { background: #3a1818; }

    .debug-msg {
      margin-top: 8px;
      padding: 6px 10px;
      background: #1a2419;
      border-left: 2px solid #2a4a20;
      color: #86efac;
      font-size: 11px;
      display: none;
    }

    .debug-msg.visible { display: block; }
    .debug-msg.error { background: #241419; border-left-color: #5a2020; color: #f87171; }

    .debug-keys {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 6px;
      padding: 6px 8px;
      background: #0d0a07;
      border: 1px solid #2a2018;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1><span class="logo">AS</span> Sessions</h1>
      </div>
      <div class="header-right">
        <a href="../popup/popup.html" class="btn" id="backBtn">&larr; Back</a>
        <button class="btn btn-danger" id="clearAllBtn">Clear All</button>
      </div>
    </div>
    <div class="subtitle" style="margin-bottom: 20px;">All recorded sessions, newest first. Up to 20 sessions are retained.</div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by hostname or session name..." autocomplete="off" />
      <span class="search-count" id="searchCount"></span>
    </div>

    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <div class="label">Sessions</div>
        <div class="value" id="totalSessions">—</div>
      </div>
      <div class="stat">
        <div class="label">Total Events</div>
        <div class="value" id="totalEvents">—</div>
      </div>
      <div class="stat">
        <div class="label">Total API Calls</div>
        <div class="value" id="totalApi">—</div>
      </div>
      <div class="stat">
        <div class="label">Storage</div>
        <div class="value" id="storageUsed">—</div>
      </div>
    </div>

    <div class="debug-panel" id="debugPanel" style="display:none">
      <div class="debug-header" id="debugToggle">
        <span>&#9888; Storage Debug</span>
        <span class="debug-caret">&#9656;</span>
      </div>
      <div class="debug-body">
        <div class="debug-section">
          <h4>Per-key bytes used</h4>
          <div id="debugKeyTable"></div>
        </div>
        <div class="debug-section" id="debugActiveSection" style="display:none">
          <h4>Orphaned activeSession detected</h4>
          <div id="debugActiveDetail"></div>
        </div>
        <div class="debug-actions">
          <button class="debug-btn" id="debugRefreshBtn">Refresh</button>
          <button class="debug-btn" id="debugListKeysBtn">Show all storage keys</button>
          <button class="debug-btn" id="debugMigrateBtn">Migrate sessions to slim format</button>
          <button class="debug-btn" id="debugRecoverBtn" style="display:none">Recover activeSession into Completed</button>
          <button class="debug-btn danger" id="debugClearActiveBtn" style="display:none">Discard activeSession</button>
        </div>
        <div class="debug-msg" id="debugMsg"></div>
        <div class="debug-keys" id="debugKeysList" style="display:none"></div>
      </div>
    </div>

    <div class="session-list" id="sessionList"></div>
  </div>

  <div class="modal-backdrop" id="previewModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="previewTitle">Session Preview</div>
          <div class="modal-subtitle" id="previewSubtitle"></div>
        </div>
        <button class="modal-close" id="previewClose">&#10005;</button>
      </div>
      <div class="modal-body" id="previewBody"></div>
    </div>
  </div>

  <script type="module" src="sessions.js"></script>
</body>
</html>
